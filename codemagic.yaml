workflows:
  android-build:
    name: VOICEZO Android
    max_build_duration: 60
    environment:
      node: 22
      java: 17
    scripts:
      - name: Install dependencies
        script: npm ci
      - name: Build web
        script: npm run build
      - name: Capacitor sync
        script: npx cap sync android
      - name: Build APK
        script: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
    artifacts:
      - android/app/build/outputs/apk/debug/app-debug.apk
    publishing:
      email:
        recipients:
          - ozanaslanao@gmail.com
        notify:
          success: true
          failure: true

  ios-build:
    name: VOICEZO iOS (Unsigned)
    max_build_duration: 60
    environment:
      node: 22
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install dependencies
        script: npm ci

      - name: Build web app
        script: npm run build

      - name: Capacitor add iOS
        script: |
          rm -rf ios
          npx cap add ios
          echo "--- ios/ contents after cap add ---"
          ls ios/
          echo "--- ios/App/ contents ---"
          ls ios/App/

      - name: Capacitor sync iOS
        script: npx cap sync ios

      - name: Install CocoaPods
        script: |
          echo "--- Podfile check ---"
          ls ios/App/Podfile
          cd ios/App
          pod install --repo-update

      - name: Set bundle ID
        script: |
          /usr/libexec/PlistBuddy -c \
            "Set :CFBundleIdentifier com.voicezo.app" \
            ios/App/App/Info.plist

      - name: Build & archive (unsigned)
        script: |
          xcodebuild \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -sdk iphoneos \
            -configuration Release \
            -archivePath "$CM_BUILD_DIR/App.xcarchive" \
            archive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            | xcpretty

      - name: Export unsigned IPA
        script: |
          mkdir -p "$CM_BUILD_DIR/ipa"
          cd "$CM_BUILD_DIR/App.xcarchive/Products/Applications"
          mkdir Payload
          cp -r App.app Payload/
          zip -r "$CM_BUILD_DIR/ipa/VOICEZO.ipa" Payload
          rm -rf Payload

    artifacts:
      - $CM_BUILD_DIR/ipa/VOICEZO.ipa

    publishing:
      email:
        recipients:
          - ozanaslanao@gmail.com
        notify:
          success: true
          failure: true

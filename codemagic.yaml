workflows:
  android-build:
    name: VOICEZO Android
    max_build_duration: 60
    environment:
      node: 20
      java: 17
    scripts:
      - name: Install dependencies
        script: npm ci
      - name: Build web
        script: npm run build
      - name: Capacitor sync
        script: npx cap sync android
      - name: Build APK
        script: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
    artifacts:
      - android/app/build/outputs/apk/debug/app-debug.apk
    publishing:
      email:
        recipients:
          - ozanaslanao@gmail.com
        notify:
          success: true
          failure: true

  ios-build:
    name: VOICEZO iOS
    max_build_duration: 60
    environment:
      node: 20
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install dependencies
        script: npm ci
      - name: Build web
        script: npm run build
      - name: Capacitor add iOS
        script: |
          npx cap add ios || true
          npx cap sync ios
      - name: Install pods
        script: |
          cd ios/App
          pod install
      - name: Build unsigned IPA
        script: |
          xcodebuild \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -archivePath build/App.xcarchive \
            archive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
          xcodebuild \
            -exportArchive \
            -archivePath build/App.xcarchive \
            -exportPath build/ipa \
            -exportOptionsPlist ios/ExportOptions.plist
    artifacts:
      - build/ipa/*.ipa
    publishing:
      email:
        recipients:
          - ozanaslanao@gmail.com
        notify:
          success: true
          failure: true

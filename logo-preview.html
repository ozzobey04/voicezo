<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  body { background: #080808; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; font-family: 'Space Grotesk', sans-serif; flex-direction: column; gap: 32px; }
  .sizes { display: flex; align-items: center; gap: 48px; }
  p { color: rgba(255,255,255,0.3); font-size: 12px; letter-spacing: .08em; }
</style>
</head>
<body>
<div class="sizes">
  <!-- 256px -->
  <svg width="256" height="256" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
    <ellipse cx="32" cy="32" rx="22" ry="14" fill="white" opacity="0.9"/>
    <ellipse cx="32" cy="32" rx="12" ry="6" fill="#080808"/>
    <rect x="30.5" y="18" width="3" height="28" rx="1.5" fill="#080808"/>
    <rect x="28.5" y="6" width="7" height="26" rx="3.5" fill="white"/>
    <ellipse cx="32" cy="7" rx="5" ry="5.5" fill="white"/>
    <ellipse cx="29" cy="33" rx="3.8" ry="3.2" fill="white" opacity="0.7"/>
    <ellipse cx="35" cy="33" rx="3.8" ry="3.2" fill="white" opacity="0.7"/>
  </svg>

  <!-- 128px -->
  <svg width="128" height="128" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
    <ellipse cx="32" cy="32" rx="22" ry="14" fill="white" opacity="0.9"/>
    <ellipse cx="32" cy="32" rx="12" ry="6" fill="#080808"/>
    <rect x="30.5" y="18" width="3" height="28" rx="1.5" fill="#080808"/>
    <rect x="28.5" y="6" width="7" height="26" rx="3.5" fill="white"/>
    <ellipse cx="32" cy="7" rx="5" ry="5.5" fill="white"/>
    <ellipse cx="29" cy="33" rx="3.8" ry="3.2" fill="white" opacity="0.7"/>
    <ellipse cx="35" cy="33" rx="3.8" ry="3.2" fill="white" opacity="0.7"/>
  </svg>

  <!-- 64px -->
  <svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
    <ellipse cx="32" cy="32" rx="22" ry="14" fill="white" opacity="0.9"/>
    <ellipse cx="32" cy="32" rx="12" ry="6" fill="#080808"/>
    <rect x="30.5" y="18" width="3" height="28" rx="1.5" fill="#080808"/>
    <rect x="28.5" y="6" width="7" height="26" rx="3.5" fill="white"/>
    <ellipse cx="32" cy="7" rx="5" ry="5.5" fill="white"/>
    <ellipse cx="29" cy="33" rx="3.8" ry="3.2" fill="white" opacity="0.7"/>
    <ellipse cx="35" cy="33" rx="3.8" ry="3.2" fill="white" opacity="0.7"/>
  </svg>

  <!-- 32px -->
  <svg width="32" height="32" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
    <ellipse cx="32" cy="32" rx="22" ry="14" fill="white" opacity="0.9"/>
    <ellipse cx="32" cy="32" rx="12" ry="6" fill="#080808"/>
    <rect x="30.5" y="18" width="3" height="28" rx="1.5" fill="#080808"/>
    <rect x="28.5" y="6" width="7" height="26" rx="3.5" fill="white"/>
    <ellipse cx="32" cy="7" rx="5" ry="5.5" fill="white"/>
    <ellipse cx="29" cy="33" rx="3.8" ry="3.2" fill="white" opacity="0.7"/>
    <ellipse cx="35" cy="33" rx="3.8" ry="3.2" fill="white" opacity="0.7"/>
  </svg>
</div>
<p>256 · 128 · 64 · 32</p>
</body>
</html>
